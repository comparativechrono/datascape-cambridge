'Average recovery is 11 days' can be true while most patients recover in 6, because three complicated cases took two months. For skewed data, the median (with the interquartile range for spread) describes the typical case honestly.

The habit that prevents the mistake: look at the shape of the data before choosing the summary. A histogram costs nothing.`},{h:"Base rates, or why screening surprises everyone",t:`A test is 95% accurate; a condition affects 1% of people. You test positive. The chance you have it is nowhere near 95% \u2014 count it out.

In 1,000 people: about 10 have the condition, and the test catches ~9 or 10 of them. But of the 990 without it, 5% \u2014 about 50 people \u2014 get false positives. Your positive is one of ~60, of which only ~10 are real. That's roughly one in six.

The rare-ness of the condition (the base rate) matters as much as the accuracy of the test. The same logic explains why 'accuracy' flatters fraud models: when fraud is 1-in-1,000, saying 'never fraud' is 99.9% accurate and 100% useless.`},{h:"Correlation is not causation",t:`Ice cream sales and drownings rise and fall together every year. Ice cream doesn't drown anyone \u2014 hot weather drives both swimming and ice cream. A hidden third factor that moves both variables is a confounder, and it's the most common reason correlations mislead.

The other suspects: reverse causation (B causes A, not A causes B) and coincidence (test enough pairs and some correlate by luck).

The discipline: when two things move together, ask what else could move both, and what evidence would distinguish the stories. Randomised experiments exist precisely because randomisation cuts every confounder at once.`},{h:"Sampling: who's in your data?",t:`Three hundred parkrun times tell you about people who choose to run on Saturday mornings \u2014 not about the city. Self-selected samples measure the selectors.

Representativeness beats volume, always. A bigger biased sample doesn't fix bias; it produces a more confident wrong answer. Watch for self-selection (surveys, app users, parkrunners), coverage gaps (who never appears in the data at all?) and survivorship (you only see the ones that made it).

The fix is in collection design, not analysis heroics afterwards: define the population, sample so everyone in it can appear, and document who's still missing.`},{h:"Uncertainty and experiments",t:`An estimate without uncertainty is a guess in a suit. A 95% confidence interval gives the range of effects consistent with the data. If that interval spans zero \u2014 say [\u22120.4, +5.2] \u2014 the data can't distinguish the effect from nothing, and 'proven to work' overstates it.

Mind the other direction too: absence of evidence isn't evidence of absence. A small trial can miss a real effect (low power). The honest read is 'plausibly between \u22120.4 and +5.2; this study can't yet tell.'

Experiments earn their conclusions through discipline: define the metric and hypothesis, compute the sample size, randomise, run for the planned duration without peeking, then test. Stopping the moment results look good manufactures false positives \u2014 that's optional stopping, and it's a bug, not enthusiasm.`},{h:"When data goes missing",t:`Missing values are data about your data. The first question is never 'what do I fill them with?' \u2014 it's 'why are they missing?'

Missing completely at random is the easy case. But often missingness is informative: sicker patients miss clinic visits, struggling stores stop reporting, unhappy users skip the survey. Drop or paper over those rows and you've quietly biased the dataset toward the healthy, the thriving and the content.

The quick fixes all mislead in their own way: zero-filling invents readings; silent row-deletion shrinks and biases the sample; mean-filling fakes completeness while crushing the variance. The professional sequence: investigate the mechanism, choose a handling strategy that matches it, and document what you did so every later analysis knows.`}]},tasks:[]},{id:"cam-window",x:800,y:250,label:"Window",lines:["Across the campus: the hospital concourse and the biomedical labs. Half the data on this site is generated within a mile of this window."],tasks:[]},{id:"cam-sofa",x:116,y:152,label:"Quiet room sofa",lines:["Someone left a journal open at a paper on survival analysis. The margins are full of pencilled question marks."],tasks:[]}]},granta:{name:"Granta FinTech",place:"CB1 District, Station Road",mp:"CB1 \xB7 Station Rd",mx:540,my:615,blurb:"Payments scale-up by the station.",rw:1100,floor:"#EBE2D2",floorKind:"wood",accent:"#C2703D",wall:"#E6E0D6",wallDark:"#BFB098",spawn:{x:600,y:505},walls:[{x:600,y:de,w:12,h:150,glass:1},{x:612,y:198,w:120,h:12,glass:1},{x:782,y:198,w:300,h:12,glass:1},{x:18,y:380,w:140,h:12},{x:208,y:380,w:104,h:12},{x:300,y:392,w:12,h:150}],labels:[{x:748,y:76,t:"THE FISHBOWL"},{x:160,y:410,t:"BREAKOUT"},{x:300,y:76,t:"DATA FLOOR"},{x:980,y:240,t:"RISK DESK"}],decor:[{t:"rug",x:40,y:420,w:235,h:105,color:"#E4D8C8"},{t:"rug",x:75,y:120,w:320,h:190,color:"#E8DECE"}],furniture:[{t:"board",x:400,y:52},{t:"meet",x:660,y:96},{t:"desk",x:100,y:150},{t:"desk",x:100,y:250},{t:"desk",x:290,y:150},{t:"desk",x:290,y:250},{t:"sofa",x:70,y:460},{t:"plant",x:245,y:472},{t:"kitchen",x:420,y:470},{t:"printer",x:520,y:300},{t:"plant",x:850,y:470},{t:"cabinet",x:700,y:300},{t:"desk",x:920,y:260},{t:"desk",x:920,y:360},{t:"cabinet",x:1030,y:300},{t:"plant",x:1050,y:470},{t:"sofa",x:880,y:100},{t:"plant",x:1040,y:90}],npcs:[{id:"marcus",name:"Marcus",role:"Head of Data Science",skin:1,shirt:"#C2703D",lines:["Fraud, churn, segmentation \u2014 every model here moves real money, so we evaluate hard before we ship.","Two problems on the board this week. Show me how you think."],tasks:["segment-customers","fraud-overfit"],waypoints:[{x:470,y:220,pause:3e3},{x:470,y:330,pause:2400},{x:650,y:320,pause:2800}]},{id:"tomasz",name:"Tomasz",role:"Analytics Engineer",skin:0,shirt:"#5B7A52",lines:["I own the warehouse. Risk team's been on at me all morning \u2014 fancy taking one off my plate?"],tasks:["sql-fraud"],waypoints:[{x:210,y:335,pause:2600},{x:380,y:335,pause:2200},{x:380,y:190,pause:3e3}]},{id:"zoe",name:"Zoe",role:"Risk Lead",skin:3,shirt:"#7A3B2E",lines:["Risk desk. We're the people who ask 'but what does the metric hide?' at every review.","Marcus says you spotted the overfit. Come and break a metric with me."],tasks:["metric-imbalance"],waypoints:[{x:960,y:320,pause:3e3},{x:960,y:440,pause:2600},{x:850,y:440,pause:2400}]}],ambient:[{skin:3,shirt:"#A0522D",waypoints:[{x:180,y:470,pause:3400},{x:240,y:440,pause:2600}]}],objects:[{id:"gr-terminal",x:1e3,y:420,label:"Risk wiki terminal",lines:["The Risk Desk's internal wiki, open on the ML practitioner's notes. Zoe's banner across the top: 'No model ships on vibes.'"],read:{id:"doc-ml",title:"ML Practitioner's Notes",pages:[{h:"The map of machine learning",t:`Supervised learning uses labelled examples to predict: classification (which category) and regression (how much). Unsupervised learning finds structure without labels \u2014 clustering groups similar things, which is why 'segment our customers' is a clustering job: nobody knows the segments in advance.

Forecasting predicts the future of a sequence from its past \u2014 related to regression, with time's arrow adding rules of its own.

Choosing the family is the first real decision, and it follows from two questions: what does the business actually want to know, and do labels for it exist?`},{h:"Generalisation is the product",t:`A model that scores brilliantly on its training data and poorly on new data has memorised, not learned. That's overfitting, and the symptom is the gap: high training score, mediocre test score.

The defence is honest evaluation: hold out data the model never sees. And honest means really never \u2014 leakage is any route by which the answer sneaks in. Classic routes: a feature that's a proxy for the target (asking rent in a rent model), preprocessing fitted on all the data before splitting (the scaler saw the test set), and repeated units scattered across folds.

That last one is subtle: five scans per patient, random folds, and the same patient lands on both sides \u2014 the model recognises the person, not the pathology. Group your folds by the unit you must generalise to: new patients, new customers, new sites.`},{h:"Metrics that survive contact with reality",t:`Accuracy is the fraction of correct predictions \u2014 and under class imbalance it lies. Fraud at 1-in-1,000: a model that always says 'not fraud' is 99.9% accurate and catches nothing.

For rare classes, use precision (of the alarms raised, how many were real \u2014 the false-alarm cost) and recall (of the real cases, how many were caught \u2014 the miss cost), or PR-AUC to summarise both. Then attach money or harm to each error type: a missed fraud and a blocked legitimate customer cost different things.

And never 'fix' the metric by rebalancing the evaluation data \u2014 a 50/50 test set scores the model on a world that doesn't exist.`},{h:"Features: knowable, fair, honest",t:`A feature must be available at the moment of prediction. Forecasting tomorrow's demand may use lagged demand, the weather forecast and calendar flags \u2014 never tomorrow's actuals. Using future information in training is time leakage: spectacular in backtests, worthless in production.

Target leakage is the same disease in another coat: any feature that's secretly a copy of the answer (the listing's asking rent, the discharge code that implies the diagnosis).

And some features are off-limits regardless of predictive power: protected characteristics \u2014 and their proxies \u2014 in pricing, scoring or screening. That's a legal line and an ethical one, and 'the model found it useful' is a confession, not a defence.`},{h:"Shipping a model is a process",t:`A go/no-go decision needs two kinds of evidence. Performance evidence: holdout and backtest results against the current approach, plus error analysis on the cases that matter most. Operational evidence: monitoring metrics with alert thresholds, and a rollback plan with a named owner.

The release sequence: confirm the evidence, set the monitoring, agree the rollback, get sign-off on that evidence, then roll out gradually with eyes on the dashboards. A deploy is only a reversible decision if the rollback exists before you need it.

Then tell people properly: what's changing, when, on what evidence, how it's watched, who pulls the cord. 'SHIPPED \u{1F680}' is a celebration; five plain sentences are accountability.`}]},tasks:[]},{id:"granta-sofa",x:116,y:512,label:"Breakout sofa",lines:["A book on the cushion: 'Weapons of Math Destruction'. Several pages are dog-eared in the chapter on credit scoring."],tasks:[]},{id:"release-board",x:560,y:90,label:"Release review board",lines:["The fraud model v3 release checklist, half-assembled and waiting for the review at two. A sticky note from Priti: 'DO NOT let them ship on vibes.'"],tasks:["grid-checklist"]},{id:"granta-board",x:448,y:132,label:"Sprint board",lines:["This sprint: 'fraud model v3 \u2014 DO NOT SHIP until eval review', 'customer segments for product', and a sad column titled 'tech debt'."],tasks:[]}]},guildhall:{name:"City Data Office",place:"The Guildhall, Market Square",mp:"Market Square",mx:430,my:400,blurb:"The council's data & insight team.",floor:"#EFE9E2",floorKind:"carpet",accent:"#A6485B",wall:"#E8E2D8",wallDark:"#BFB29E",spawn:{x:643,y:505},walls:[{x:280,y:de,w:12,h:160},{x:18,y:208,w:160,h:12},{x:228,y:208,w:64,h:12},{x:300,y:380,w:140,h:12},{x:490,y:380,w:110,h:12},{x:300,y:392,w:12,h:150},{x:588,y:392,w:12,h:150}],labels:[{x:150,y:76,t:"RECORDS"},{x:450,y:410,t:"COMMITTEE ROOM"},{x:560,y:76,t:"INSIGHT TEAM"}],decor:[{t:"rug",x:320,y:400,w:256,h:130,color:"#E2D2CC"}],furniture:[{t:"board",x:640,y:52},{t:"server",x:70,y:84},{t:"printer",x:170,y:100},{t:"cabinet",x:80,y:160},{t:"shelf",x:250,y:100},{t:"desk",x:370,y:150},{t:"desk",x:370,y:250},{t:"desk",x:560,y:150},{t:"desk",x:560,y:250},{t:"meet",x:370,y:440},{t:"kitchen",x:700,y:470},{t:"plant",x:850,y:80},{t:"plant",x:40,y:470}],npcs:[{id:"sandra",name:"Sandra",role:"Data Protection Officer",skin:0,shirt:"#A6485B",lines:["Public-sector data touches everyone in this city \u2014 which is exactly why governance isn't paperwork, it's the job.","I keep a couple of live cases aside for apprentices. Ready?"],tasks:["retention-policy","housing-bias","footfall-scope"],waypoints:[{x:480,y:330,pause:3e3},{x:660,y:190,pause:2600},{x:340,y:330,pause:2400}]},{id:"ade",name:"Ade",role:"Information Governance Officer",skin:4,shirt:"#6E4A8C",lines:["Records, retention, risk \u2014 if it has personal data in it, it crosses my desk eventually.","You handled the housing-bias audit, I hear. Time you learned the formal process behind it."],tasks:["dpia-order"],waypoints:[{x:140,y:120,pause:3200},{x:140,y:300,pause:2800},{x:240,y:300,pause:2400}]}],ambient:[{skin:2,shirt:"#6E7F66",waypoints:[{x:210,y:310,pause:2800},{x:210,y:160,pause:3400},{x:360,y:310,pause:2200}]},{skin:4,shirt:"#7A8AA6",waypoints:[{x:700,y:310,pause:2400},{x:760,y:440,pause:3e3}]}],objects:[{id:"gh-handbook",x:170,y:170,label:"Governance handbook",lines:["The council's information governance handbook, in the records room where it belongs. The DPIA chapter has the most coffee rings."],read:{id:"doc-gov",title:"Information Governance Handbook",pages:[{h:"Data protection, the working version",t:`The principles you'll use weekly: have a lawful basis for processing; collect data for a stated purpose and don't quietly repurpose it (purpose limitation); collect only what you need (minimisation); keep it only as long as you can justify (retention); keep it accurate and secure.

Special category data \u2014 health, including mood; ethnicity; beliefs \u2014 gets stricter rules, usually explicit consent.

Consent worth the name is specific (per purpose, not 'everything'), informed (plain words), freely given (no pre-ticked boxes, no burying on page 14) and as easy to withdraw as it was to give. Designs that maximise opt-in by obscuring choice fail legally and morally at once.`},{h:"Bias lives in the data",t:`Models learn the past \u2014 including its discrimination. Train a housing or lending model on historical decisions and it reproduces historical prejudice with a confident new interface.

Removing the protected attribute isn't enough: proxies carry it back in. Postcode can encode ethnicity; first names can encode gender. The honest approach is to audit outcomes by group \u2014 does the model's error rate or benefit differ across protected groups? \u2014 and treat fairness as something you measure, not assume.

Protected characteristics are never legitimate features for pricing, scoring or screening people. Where bias is found, the work is mitigation and documentation, not deletion of the evidence.`},{h:"The DPIA: bias auditing, formalised",t:`A Data Protection Impact Assessment is required before high-risk processing of personal data \u2014 profiling people, deploying new technology on them, algorithmic prioritisation of services.

Its shape follows its logic: describe the processing (what data, about whom, for what purpose); assess necessity and proportionality against that purpose; identify the risks to the individuals affected \u2014 bias and discrimination included; design mitigations for each risk; get the Data Protection Officer's sign-off on what risk remains; and set review dates.

A DPIA is a living document. The system changes, the data drifts, the assessment gets revisited \u2014 it's a practice, not a filing exercise.`},{h:"Scoping: from question to problem",t:`'Is the market doing better?' isn't answerable. 'How did average daily footfall per zone change in the 12 months after the layout change versus the 12 before, comparing like-for-like day types, with weather noted as a caveat?' \u2014 that's answerable, and fair.

A good reformulation pins down: the metric (what we'll measure), the comparison (against what), the period and segments, the caveats, and above all the decision the analysis serves. If pitch fees or staffing ride on the answer, the scoping IS the fairness.

Anecdotes, single-day cherry-picks and 'pull everything and look for something interesting' all fail the people who depend on the answer.`}]},tasks:[]},{id:"gh-window",x:60,y:330,label:"Window over Market Square",lines:["Below, the market stalls are out in force. Footfall sensors on the lamp posts feed straight into this office."],tasks:[]},{id:"gh-records",x:112,y:202,label:"Records cabinet",lines:["Decades of permit files. A printed retention schedule is taped to the side \u2014 half the rows are highlighted and annotated 'DELETE BY'."],tasks:[]}]},bridge:{name:"Bridge Insights",place:"Quayside, by the Cam",mp:"Quayside",mx:370,my:250,blurb:"Analytics agency on the riverside.",rw:1100,floor:"#E7EBE2",floorKind:"wood",accent:"#3D7A8C",wall:"#DCE7EA",wallDark:"#A4BDC6",spawn:{x:560,y:505},walls:[{x:620,y:de,w:12,h:160,glass:1},{x:620,y:258,w:12,h:284,glass:1},{x:882,y:de,w:12,h:150},{x:882,y:248,w:12,h:294},{x:18,y:420,w:82,h:12},{x:150,y:420,w:90,h:12},{x:240,y:420,w:12,h:50},{x:240,y:520,w:12,h:22}],labels:[{x:762,y:76,t:"BOARDROOM"},{x:280,y:76,t:"THE STUDIO"},{x:128,y:448,t:"QUIET POD"},{x:985,y:76,t:"THE GALLERY"}],decor:[{t:"rug",x:70,y:120,w:320,h:190,color:"#D6E3E8"},{t:"rug",x:660,y:130,w:200,h:180,color:"#DDE8EC"}],furniture:[{t:"board",x:300,y:52},{t:"desk",x:90,y:150},{t:"desk",x:90,y:250},{t:"desk",x:280,y:150},{t:"desk",x:280,y:250},{t:"meet",x:690,y:180},{t:"sofa",x:700,y:440},{t:"plant",x:650,y:472},{t:"sofa",x:110,y:460},{t:"kitchen",x:380,y:470},{t:"printer",x:500,y:150},{t:"plant",x:560,y:60},{t:"sofa",x:930,y:90},{t:"cabinet",x:1e3,y:160},{t:"sofa",x:930,y:460},{t:"plant",x:1050,y:470},{t:"shelf",x:1056,y:250}],npcs:[{id:"leah",name:"Leah",role:"Engagement Manager",skin:2,shirt:"#3D7A8C",lines:["Half this job is analysis. The other half is making the analysis land with people who have ninety seconds and a budget meeting.","One client situation for you to call."],tasks:["client-pitch","dashboard-critique"],waypoints:[{x:400,y:330,pause:3e3},{x:400,y:180,pause:2400},{x:210,y:380,pause:2600}]},{id:"samj",name:"Sam",role:"Data journalist in residence",skin:2,shirt:"#2C5F70",lines:["The Gallery is my collection: every misleading chart that's crossed this studio's desk, framed as a warning.","A client just sent a new candidate for the wall. Tell me you can spot it."],tasks:["chart-crimes"],waypoints:[{x:960,y:250,pause:3e3},{x:1040,y:320,pause:2600},{x:930,y:400,pause:2400}]},{id:"dev",name:"Dev",role:"Data Analyst",skin:3,shirt:"#C2703D",lines:["Dashboard review at four. No pressure, but the council reads these charts more carefully than the report."],tasks:["build-footfall"],waypoints:[{x:250,y:270,pause:2600},{x:520,y:270,pause:2200},{x:520,y:410,pause:3e3}]}],ambient:[{skin:1,shirt:"#8A6FA8",waypoints:[{x:700,y:330,pause:3600},{x:790,y:330,pause:2800}]}],objects:[{id:"br-shelf",x:510,y:240,label:"Studio bookshelf",lines:["Leah's communication playbook sits between design annuals. Spine creased at 'Honest axes'."],read:{id:"doc-comms",title:"The Communication Playbook",pages:[{h:"Choose the chart from the question",t:`The chart type is determined by the question, not by taste.

Change over time \u2192 line: consecutive points connected because the in-between is meaningful. Comparing categories \u2192 bar: discrete things, discrete bars. Relationship between two measures \u2192 scatter: every point an observation, the pattern is the message. Parts of a whole \u2192 pie, used sparingly, few slices, and never for negative values.

And some columns chart nothing: identifiers and constants (sensor IDs, a river level that never moves) answer no question. If a chart can't be read in three seconds, it isn't done.`},{h:"Honest axes",t:`Bars encode value as length, so bars must start at zero \u2014 a truncated axis turns a 2% difference into a visual cliff.

When values go both ways (zones up, zones down), use diverging bars from a shared zero baseline: gains rise, losses fall, and the bad news is exactly as visible as the good. Burying the negative zones isn't simplification; it's misleading someone whose decision depends on them.

Sorting bars by value aids comparison; consistent scales across panels prevent accidental lies; and a line between categories invents a trend that doesn't exist \u2014 zones aren't a sequence.`},{h:"Rooms, not reports",t:`Know the audience before the first slide: traders want their livelihood addressed, clinicians want risk quantified, councillors want a defensible decision. Lead with the answer \u2014 the journey to it is for questions.

Mixed news gets the whole picture: footfall up 9% overall AND down 4% in the south zone, then what drives the difference, then what could be done. Cherry-picking either half misleads someone, and trust survives bad news but not selective news.

Translate, don't dilute: 'we can't yet rule out no effect' is plain English for a confidence interval spanning zero, and it's more honest than either 'it works' or 'it failed'.`},{h:"Updates that travel",t:`A status update has three sentences' worth of jobs: what happened (cause), what you did (action), what could recur (residual risk). 'All sorted \u{1F44D}' hides the risk that bites again tomorrow; 400 lines of forwarded logs make the reader do your job.

A release announcement is the same discipline for change: what's changing, when, on what evidence, how it's monitored, who owns the rollback. The whole company can act on five plain sentences.

Write for the person who reads it cold at 9am \u2014 short, honest, actionable, and auditable six months later.`}]},tasks:[]},{id:"gallery-wall",x:1e3,y:300,label:"The wall of chart crimes",lines:["Framed and labelled like a rogues' gallery: 'The Tower of 2%', 'The Convenient Window', 'The Pie of Darkness'. Sam gives tours."],read:{id:"doc-gallery",title:"The Gallery of Misleading Charts",pages:[{h:"Exhibit A: the truncated axis",t:`Revenue bars from \xA350m to \xA352m, axis starting at \xA350m: a 4% rise drawn as a tower ten times taller than its neighbour. The numbers are technically correct; the picture is a lie.

Bars encode value as length, so bar axes start at zero \u2014 no exceptions for excitement. If the genuinely interesting story lives in a narrow range, switch to a line or dot plot with clearly labelled bounds, and let the headline match the numbers.

The test: cover the axis labels. If the visual impression changes when you uncover them, the chart is doing the lying for you.`},{h:"Exhibit B: the convenient window",t:`Every wiggly time series contains a flattering segment. Start the chart at the 2023 trough and growth looks heroic; start at the 2021 peak and it's a collapse. Same data, opposite stories.

The honest version shows the full available history, or justifies the window in writing ('since the relaunch'). Cherry-picking the start date is cherry-picking the conclusion.

Related crimes: smoothing until the inconvenient dip vanishes, and switching between absolute and percentage views mid-argument depending on which flatters.`},{h:"Exhibit C: double trouble",t:`Dual-axis charts let you scale either axis until the two lines cross wherever drama requires. Unless both series share real units, the crossing point is a design choice, not a finding.

Cumulative charts only ever go up \u2014 plotting cumulative sales to hide slowing sales is a classic. Plot the rate, not the running total, when the question is 'how are we doing lately?'

And the 3D pie, tilted so the nearest slice looms largest: perspective distorts area, and area was the whole point. The Gallery's oldest exhibit, and still committed weekly.`}]},tasks:[]},{id:"br-window",x:856,y:380,label:"Riverside window",lines:["Punts drift past Quayside below. A tourist waves. Somewhere out there is a dataset about punt traffic, and one day a client will ask for it."],tasks:[]},{id:"br-laptop",x:430,y:330,label:"Studio laptop",lines:["Dev's spare laptop, signed into the council footfall warehouse. A sticky note on the lid: 'Footfall Files \u2014 zone totals, market days only. Ask Sandra for the brief first.'"],tasks:["footfall-sql"]},{id:"br-board",x:348,y:132,label:"Studio wall",lines:["Pinned: a printout titled 'CHART CRIMES' \u2014 a 3D pie, a truncated axis, a dual-axis special. Each annotated in red pen."],tasks:[]}]},helix:{name:"Helix Therapeutics",place:"Cambridge Biomedical Campus",mp:"Biomedical Campus",mx:940,my:620,blurb:"Drug-discovery biotech on the campus.",floor:"#EFEDF4",floorKind:"carpet",accent:"#7A4E8C",wall:"#E6E2EE",wallDark:"#B9AFC9",spawn:{x:370,y:505},walls:[{x:560,y:de,w:12,h:150,glass:1},{x:572,y:198,w:130,h:12,glass:1},{x:752,y:198,w:130,h:12,glass:1},{x:18,y:380,w:130,h:12},{x:198,y:380,w:114,h:12},{x:300,y:392,w:12,h:150}],labels:[{x:730,y:76,t:"SEQUENCING LAB"},{x:165,y:408,t:"MEETING ROOM"},{x:330,y:76,t:"DRY LAB"}],decor:[{t:"rug",x:340,y:120,w:300,h:190,color:"#E2DCEC"}],furniture:[{t:"board",x:360,y:52},{t:"server",x:620,y:84},{t:"server",x:690,y:84},{t:"printer",x:790,y:100},{t:"cabinet",x:760,y:156},{t:"desk",x:120,y:150},{t:"desk",x:120,y:250},{t:"desk",x:340,y:150},{t:"desk",x:340,y:250},{t:"meet",x:80,y:430},{t:"kitchen",x:420,y:470},{t:"plant",x:40,y:60},{t:"plant",x:850,y:470},{t:"shelf",x:856,y:280}],npcs:[{id:"drma",name:"Dr. Ma",role:"Computational Biologist",skin:2,shirt:"#7A4E8C",lines:["We model adverse-reaction risk from trial data. When the stakes are patients, sloppy validation isn't a style issue.","I've got a model review that needs a second pair of eyes."],tasks:["leakage-split"],waypoints:[{x:440,y:320,pause:3e3},{x:440,y:180,pause:2600},{x:240,y:320,pause:2400}]},{id:"ines",name:"Ines",role:"Trial Analyst",skin:0,shirt:"#4E7A8C",lines:["Three treatment arms, one investigator meeting on Friday. The chart on slide four decides the conversation."],tasks:["arm-compare","cv-design"],waypoints:[{x:520,y:440,pause:2800},{x:340,y:440,pause:2400},{x:180,y:320,pause:2600}]}],ambient:[{skin:4,shirt:"#8A6FA8",waypoints:[{x:640,y:300,pause:2400},{x:790,y:300,pause:2800},{x:640,y:420,pause:2200}]}],objects:[{id:"hx-seq",x:660,y:158,label:"Sequencing rigs",lines:["Two sequencers chew through the latest cohort. A whiteboard tally beside them reads 'terabytes this week: 14'. Someone has drawn a small worried face."],tasks:[]},{read:{id:"doc-trials",title:"Trials & Evidence Notes",pages:[{h:"Leakage wears a lab coat",t:`Clinical data leaks in respectable-looking ways. The scaler fitted on the full dataset before splitting has already seen the test set \u2014 fit preprocessing on training data only, then apply it.

Repeated measures are the subtler trap: several scans or visits per patient, randomly shuffled into folds, puts the same patient on both sides of the evaluation. The model part-recognises the person and the score inflates.

The principle that resolves every variant: split along the unit you must generalise to. Deployment means new patients \u2014 so folds group by patient, every scan of a patient staying together.`},{h:"Reading a result",t:`A trial result is an effect size with an interval, not a verdict. 'Improved 2.4 days, 95% CI [\u22120.4, +5.2]' means the data are consistent with anything from slight harm to strong benefit \u2014 including nothing.

An interval spanning zero doesn't prove no effect; the study may be underpowered. The two honest statements coexist: we can't claim benefit, and we can't claim its absence.

Be suspicious of results that emerged from flexibility \u2014 extending the trial until significance, switching endpoints, slicing subgroups until one shines. Evidence is what survives a plan made in advance.`},{h:"Showing the comparison",t:`When two arms are compared, the chart's job is the clinical decision. Both arms visible at the same scale; uncertainty shown, not hidden; the metric that matters to patients, not the one that flatters.

Bars for arm summaries start at zero. Intervals belong on the chart \u2014 a gap between bars that the intervals swallow is a finding about uncertainty, not about the drug.

The test before it ships: could a careful reader reach the wrong conclusion faster than the right one? If yes, redesign.`}]},id:"hx-shelf",x:820,y:320,label:"Reference shelf",lines:["Pharmacology references and one well-worn statistics text. A bookmark sits in the chapter on multiple comparisons."],tasks:[]}]},cavendish:{name:"Cavendish Compute",place:"Cambridge Science Park",mp:"Science Park",mx:980,my:150,blurb:"Cloud & HPC provider on the park.",floor:"#EDE7DA",floorKind:"wood",accent:"#3E5FA8",wall:"#DEE3EC",wallDark:"#A7B4CB",spawn:{x:550,y:505},walls:[{x:620,y:de,w:12,h:200},{x:620,y:298,w:12,h:244},{x:18,y:380,w:130,h:12},{x:198,y:380,w:114,h:12},{x:300,y:392,w:12,h:150}],labels:[{x:760,y:76,t:"SERVER HALL"},{x:160,y:408,t:"BREAKOUT"},{x:320,y:76,t:"PLATFORM TEAM"}],decor:[{t:"rug",x:60,y:120,w:320,h:190,color:"#E6DECF"},{t:"rug",x:40,y:420,w:235,h:105,color:"#E2D8C6"}],furniture:[{t:"board",x:340,y:52},{t:"server",x:680,y:84},{t:"server",x:750,y:84},{t:"server",x:820,y:84},{t:"server",x:680,y:170},{t:"server",x:750,y:170},{t:"server",x:820,y:170},{t:"desk",x:90,y:150},{t:"desk",x:90,y:250},{t:"desk",x:280,y:150},{t:"desk",x:280,y:250},{t:"sofa",x:70,y:460},{t:"plant",x:240,y:470},{t:"kitchen",x:380,y:470},{t:"printer",x:480,y:150},{t:"cabinet",x:480,y:250},{t:"plant",x:850,y:470}],npcs:[{id:"ravi",name:"Ravi",role:"Platform Lead",skin:1,shirt:"#3E5FA8",lines:["Half of Cambridge's startups train models on our racks. We sell compute \u2014 and the data plumbing that feeds it.","Got an architecture call to make, and the ops console has a ticket with your name on it."],tasks:["batch-stream"],waypoints:[{x:420,y:310,pause:3e3},{x:420,y:170,pause:2600},{x:200,y:330,pause:2400}]},{id:"mei",name:"Mei",role:"Billing Analyst",skin:2,shirt:"#8C6239",lines:["Compute is the product, billing is the truth. Finance wants customer totals and the quarter closes Friday.","You've run our console before \u2014 this one needs two tables."],tasks:["sql-join"],waypoints:[{x:480,y:330,pause:3e3},{x:300,y:330,pause:2600},{x:480,y:210,pause:2400}]}],ambient:[{skin:3,shirt:"#7A8AA6",waypoints:[{x:160,y:470,pause:3200},{x:230,y:440,pause:2600}]}],objects:[{id:"cav-manual",x:560,y:260,label:"SQL desk reference",lines:["A laminated SQL reference chained to the desk like a bank pen. The JOIN page has been laminated twice."],read:{id:"doc-sql",title:"SQL Desk Reference",pages:[{h:"Anatomy of a query",t:`SELECT columns FROM table WHERE conditions ORDER BY sort LIMIT n. That one shape answers an enormous share of real questions.

The engine thinks in this order: FROM (which table), WHERE (which rows survive), SELECT (which columns to show), ORDER BY (how to sort), LIMIT (how many to keep). Reading queries in that order makes them stop being magic.

The top-N pattern: ORDER BY the measure descending, LIMIT to the count you need. 'Top three customers by spend' is one ORDER BY and one LIMIT \u2014 no loops, no exports to a spreadsheet.`},{h:"Aggregation: many rows, one answer",t:`Aggregate functions collapse rows: COUNT(*), SUM(x), AVG(x), MIN, MAX. On their own they collapse the whole table to one row.

GROUP BY changes that: one output row per group. 'Average reading per building' is AVG(kwh) with GROUP BY building. The rule that catches everyone: every selected column that isn't inside an aggregate must appear in the GROUP BY.

WHERE still filters individual rows \u2014 and it runs before the grouping. 'Total visits per zone on market days' filters to market days first (WHERE), then totals per zone (SUM + GROUP BY). Filter, then aggregate.`},{h:"HAVING and the duplicate hunt",t:`WHERE filters rows before grouping. HAVING filters groups after aggregation. You need HAVING the moment your condition is about an aggregate \u2014 you can't WHERE on COUNT(*), because counts don't exist until grouping has happened.

The canonical duplicate hunt: GROUP BY the columns that define identity, count the copies, keep only groups with more than one.

SELECT building, reading_time, COUNT(*) FROM readings GROUP BY building, reading_time HAVING COUNT(*) > 1

This identifies exactly what's duplicated and how badly \u2014 before anyone deletes anything. Identify first; fix surgically.`},{h:"JOIN: two tables, one truth",t:`Real data is split across tables on purpose: names live in customers, usage lives in jobs, and a shared key (customer_id) ties them together. JOIN stitches them back for one question.

SELECT c.name, SUM(j.gpu_hours) FROM jobs j JOIN customers c ON c.customer_id = j.customer_id WHERE j.status = 'completed' GROUP BY c.name

The ON clause states the matching rule \u2014 almost always the shared key. Aliases (j, c) keep it readable. Everything else is the grammar you already know: WHERE filters, GROUP BY aggregates. JOINs aren't new magic; they're composition.`}]},tasks:[]},{id:"cav-console",x:510,y:330,label:"Ops console",lines:["The billing warehouse console blinks expectantly. One ticket from Finance, flagged 'before month-end'."],tasks:["sql-top"]},{id:"cav-hall",x:700,y:262,label:"Server hall door",lines:["A wall of racks hums behind glass. The temperature readout flicks between 21.2 and 21.4. Somewhere in there, three startups are training the same idea."],tasks:[]}]},park:{name:"Parker's Piece",place:"Open green, city centre",mp:"City centre green",mx:260,my:555,icon:"park",outdoor:!0,blurb:"Where Cambridge goes to breathe (and run).",rw:1250,rh:720,floor:"#CDE3BD",floorKind:"grass",accent:"#3E7D52",wall:"#A8C49A",wallDark:"#86A878",spawn:{x:625,y:660},walls:[],labels:[{x:625,y:86,t:"PARKER'S PIECE"},{x:300,y:350,t:"THE CRICKET SQUARE"}],decor:[{t:"rug",plain:1,x:605,y:48,w:40,h:654,color:"#E5DCC3"},{t:"rug",plain:1,x:18,y:380,w:1214,h:40,color:"#E5DCC3"},{t:"oval",x:150,y:95,w:360,h:240,color:"none",stroke:"#F2EFE6",dash:"8 8"},{t:"oval",x:170,y:110,w:320,h:210,color:"#D8E9C2"},{t:"rug",plain:1,x:250,y:196,w:130,h:26,color:"#DCCFA6"},{t:"rug",plain:1,x:256,y:199,w:3,h:20,color:"#F5F2E8"},{t:"rug",plain:1,x:371,y:199,w:3,h:20,color:"#F5F2E8"}],furniture:[{t:"tree",x:80,y:80},{t:"tree",x:540,y:70},{t:"tree",x:750,y:90},{t:"tree",x:900,y:70},{t:"tree",x:1100,y:100},{t:"tree",x:1160,y:200},{t:"tree",x:1030,y:280},{t:"tree",x:80,y:300},{t:"tree",x:90,y:560},{t:"tree",x:180,y:620},{t:"tree",x:520,y:560},{t:"tree",x:760,y:640},{t:"tree",x:960,y:620},{t:"tree",x:1150,y:560},{t:"tree",x:900,y:470},{t:"bench",x:500,y:346},{t:"bench",x:700,y:346},{t:"bench",x:500,y:430},{t:"bench",x:700,y:430},{t:"bench",x:540,y:130},{t:"lamp",x:619,y:394},{t:"stand",x:840,y:520},{t:"stumps",x:262,y:203},{t:"stumps",x:356,y:203}],npcs:[{id:"dana",name:"Dana",role:"parkrun volunteer",skin:4,shirt:"#C9483C",lines:["Three hundred runners every Saturday, rain or shine. And every week someone wants to 'do something with the data'.","Go on then \u2014 here's this week's data question."],tasks:["parkrun-bias"],waypoints:[{x:350,y:500,pause:3e3},{x:800,y:520,pause:2600},{x:950,y:300,pause:2800}]},{id:"theo",name:"Theo",role:"Co-founder, Puntlytics",skin:1,shirt:"#1F8A70",lines:["Freya does the pitches, I do the legwork. Today's legwork: figuring out how we actually count punts properly."],tasks:["punt-protocol"],waypoints:[{x:900,y:180,pause:3200},{x:1080,y:180,pause:2600},{x:1080,y:330,pause:2400}]},{id:"walt",name:"Walt",role:"Club scorer, 41 seasons",skin:3,shirt:"#F2EFE6",lines:["Forty-one seasons scoring on this square. Jack Hobbs learned to bat right here, you know. RIGHT here.","And in forty-one seasons I have never once seen a committee argue correctly about batting averages. Care to settle this year's?"],tasks:["simpsons-cricket"],waypoints:[{x:470,y:210,pause:3400},{x:440,y:262,pause:2800},{x:505,y:255,pause:2600}]}],ambient:[{skin:2,shirt:"#E9A13B",waypoints:[{x:100,y:140,pause:400},{x:1130,y:140,pause:400},{x:1130,y:640,pause:400},{x:100,y:640,pause:400}]},{skin:0,shirt:"#F2EFE6",waypoints:[{x:404,y:206,pause:2200},{x:372,y:206,pause:300}]},{skin:4,shirt:"#F2EFE6",waypoints:[{x:240,y:206,pause:2600},{x:247,y:206,pause:800}]},{skin:1,shirt:"#F2EFE6",waypoints:[{x:300,y:116,pause:2400},{x:352,y:124,pause:2e3}]},{skin:3,shirt:"#F2EFE6",waypoints:[{x:430,y:286,pause:2600},{x:392,y:272,pause:2200}]},{skin:2,shirt:"#F2EFE6",waypoints:[{x:224,y:208,pause:3e3},{x:228,y:206,pause:1200}]}],objects:[{id:"park-noticeboard",x:760,y:470,label:"Community noticeboard",lines:["Between lost-cat posters and parkrun times, someone has pinned two beautifully written pages on counting things properly. Cambridge."],read:{id:"doc-field",title:"Field Notes: Counting Things",pages:[{h:"Who ends up in your sample?",t:`Whatever you count by convenience, you count with bias. Stand by the river on sunny afternoons and you'll conclude punting is always busy; survey parkrunners and the city looks miraculously fit.

Self-selection means the data describes the people who showed up, not the population. More of a biased sample doesn't help \u2014 it makes the wrong answer more confident.

Before counting anything, write down: who is the population, who can my method actually see, and who is invisible to it?`},{h:"Design the count",t:`Usable field data is designed, not improvised. Fixed windows (15 minutes) at fixed stations make counts comparable. Coverage across weekdays, weekends and weathers captures the variation you'll want to model.

Write the counting rule down: what exactly counts as one 'trip'? A punt leaving? Returning? Both? Ambiguity here becomes noise forever.

And run overlap sessions \u2014 two counters, same window \u2014 to measure whether your counters agree. Whatever you collect badly now, the model learns forever.`}]},tasks:[]},{id:"park-scoreboard",x:470,y:160,label:"Club scoreboard",lines:["A wooden scoreboard with sliding number plates, plus Walt's almanac chained beneath it. The almanac is better organised than most data warehouses."],read:{id:"doc-almanac",title:"The Scorer's Almanac",pages:[{h:"Averages with hidden weights",t:`Asha averages more than Raj in the first half of the season AND in the second half \u2014 yet Raj's season average is higher. No arithmetic error. This is Simpson's paradox, and it turns on weighting.

Raj played most of his innings in the second half, on flat July pitches when everyone scored heavily. His overall average is dominated by the easy half; Asha's is dragged by the hard one. Each half-season comparison is fair; the season totals weight the halves differently for each player.

The rule: before comparing two averages, ask what each one is averaging OVER. If the group sizes differ, the aggregate can reverse the story. Check the innings counts \u2014 always.`},{h:"Small samples at the crease",t:`Three innings prove nothing. A batter averaging 60 after three knocks is mostly enjoying variance; one averaging 35 over forty innings has told you something real.

Form is noisy. The player of the month usually disappoints next month \u2014 not because of a curse, but because an extreme run is typically followed by a more ordinary one. Regression to the mean is arithmetic, not psychology.

The scorer's discipline applies to every dashboard you'll ever build: report the sample size next to the average, and refuse to rank anyone on three data points.`}]},tasks:[]},{id:"park-lamp",x:625,y:430,label:"Reality Checkpoint",lines:["The famous lamppost at the crossing of the paths. Generations of students have passed it on the way back to reality. Someone has chalked 'CORRELATION \u2260 CAUSATION' on the base."],tasks:[]},{id:"park-cart",x:872,y:574,label:"Coffee cart",lines:["Flat whites for runners and one very good almond croissant. The owner keeps a tally of sales by weather. 'Rain doubles hot chocolate,' she says. 'That's data.'"],tasks:[]}]},pub:{name:"The Beacon",place:"Bene't Street (fictional pub)",mp:"Bene't Street",mx:220,my:360,icon:"pub",blurb:"Quiz nights, trade meetings & one dartboard.",floor:"#E0D2B8",floorKind:"wood",accent:"#8C4A2E",wall:"#D8C8B0",wallDark:"#AB9270",spawn:{x:450,y:505},walls:[{x:640,y:380,w:12,h:60},{x:640,y:490,w:12,h:52},{x:652,y:380,w:230,h:12}],labels:[{x:300,y:76,t:"THE BEACON \xB7 EST. 1953"},{x:770,y:408,t:"THE SNUG"}],decor:[{t:"rug",x:90,y:160,w:480,h:280,color:"#D6C2A2"}],furniture:[{t:"bar",x:300,y:80},{t:"board",x:110,y:52},{t:"pubtable",x:110,y:200},{t:"pubtable",x:110,y:360},{t:"pubtable",x:300,y:260},{t:"pubtable",x:500,y:300},{t:"pubtable",x:560,y:180},{t:"pubtable",x:180,y:470},{t:"sofa",x:690,y:430},{t:"pubtable",x:750,y:478},{t:"plant",x:40,y:470},{t:"plant",x:850,y:80}],npcs:[{id:"maggie",name:"Maggie",role:"Quizmaster",skin:0,shirt:"#6E3B8C",lines:["Thursday is quiz night. Round four is 'Lies, Damned Lies and Statistics' and it's mine.","Fancy a warm-up question?"],tasks:["quiz-night"],waypoints:[{x:380,y:200,pause:3e3},{x:200,y:300,pause:2600},{x:520,y:320,pause:2400}]},{id:"bill",name:"Bill",role:"Market Traders' Association",skin:3,shirt:"#5B6B3A",lines:["Forty years on the market, and now the council says the numbers will decide our pitch fees. So the numbers had better be straight."],tasks:["footfall-pitch"],waypoints:[{x:170,y:420,pause:3400},{x:280,y:420,pause:2800}]}],ambient:[{skin:4,shirt:"#7A8AA6",waypoints:[{x:500,y:440,pause:3e3},{x:420,y:440,pause:2600}]},{skin:1,shirt:"#A0522D",waypoints:[{x:620,y:200,pause:2800},{x:620,y:320,pause:2400}]}],objects:[{id:"pb-quizbook",x:728,y:416,label:"Quiz study book",lines:["Maggie's own study book, left in the snug. 'Round Four: Lies, Damned Lies' \u2014 annotated, dog-eared, dangerous."],read:{id:"doc-quiz",title:"The Beacon Book of Stats Trivia",pages:[{h:"Round four favourites",t:`Ice cream sales correlate with drownings (hot weather causes both). Shark attacks correlate with ice cream too \u2014 same sun. Storks correlate with birth rates across regions (rural areas have more of each).

The pattern behind every favourite: a third factor moving both, a confounder. The quiz-winning reflex is never 'A causes B' \u2014 it's 'what causes both?'

Honourable mention: with enough variables, some correlate by pure chance. Test a thousand pairs and luck guarantees fireworks.`},{h:"The pub defence kit",t:`Small samples brag loudest. Three games of darts decide nothing \u2014 variance does. The chalk ledger by the board is a monument to noise.

ity, age, distance to transport. They're knowable for any property, including ones never listed before.

The listing's current asking rent is a proxy for the answer \u2014 include it and the model 'predicts' brilliantly by copying the market, errors, prejudice and all. That's target leakage.

Applicant name and nationality are protected characteristics: illegal and wrong to price on, full stop \u2014 and postcode deserves caution as a proxy for them.`},{h:"Fair by audit, not by hope",t:`A model trained on past rents learns past discrimination. Removing sensitive fields isn't enough when proxies smuggle them back.

The Nestwise rule: audit estimates by area and group, publish the audit method, and treat any systematic gap as a defect with an owner. Fairness is a measured property of outputs \u2014 never an assumption about inputs.`}]},id:"nw-wall",x:470,y:134,label:"Sticky-note wall",lines:["A galaxy of sticky notes. 'MVP', 'ship it', 'DO NOT use asking rent as a feature (AGAIN)', and one that just says 'sleep?'."],tasks:[]}]},fenline:{name:"Fenline Energy",place:"The Hatchery, St John's Innovation Park",mx:0,my:0,hidden:!0,hub:"hatchery",blurb:"Smart-grid analytics for the Fens.",floor:"#EFE6D2",floorKind:"wood",accent:"#946B2D",wall:"#EDE4D2",wallDark:"#C7B894",spawn:{x:450,y:505},walls:[{x:620,y:de,w:12,h:150,glass:1},{x:632,y:198,w:120,h:12,glass:1},{x:802,y:198,w:80,h:12,glass:1}],labels:[{x:750,y:76,t:"GRID WALL"},{x:300,y:76,t:"THE FLOOR"}],decor:[{t:"rug",x:70,y:120,w:330,h:190,color:"#EADCBE"}],furniture:[{t:"board",x:400,y:52},{t:"server",x:660,y:84},{t:"server",x:730,y:84},{t:"cabinet",x:820,y:150},{t:"printer",x:700,y:150},{t:"desk",x:100,y:150},{t:"desk",x:100,y:250},{t:"desk",x:290,y:150},{t:"kitchen",x:90,y:470},{t:"sofa",x:300,y:460},{t:"plant",x:560,y:470},{t:"plant",x:850,y:470},{t:"shelf",x:856,y:300}],npcs:[{id:"bea",name:"Bea",role:"Founder, Fenline Energy",skin:4,shirt:"#946B2D",lines:["The grid is the biggest machine in the country and it runs on guesses. We're replacing the guesses.","Tomorrow evening's demand peak \u2014 predict it well and turbines spin up in time. Want a go?"],tasks:["grid-forecast"],waypoints:[{x:250,y:330,pause:3e3},{x:430,y:330,pause:2600},{x:430,y:170,pause:2400}]}],ambient:[{skin:1,shirt:"#5B6B3A",waypoints:[{x:560,y:300,pause:2600},{x:560,y:160,pause:2200}]}],objects:[{read:{id:"doc-fcast",title:"Forecasting 101 (taped to the screen)",pages:[{h:"Knowable at prediction time",t:`The iron rule of forecasting features: you may only use what exists at the moment of prediction. Predicting tomorrow evening's peak, you have yesterday's demand, last week's same-day demand, the weather forecast, and the calendar (weekday, holiday, big match).

Tomorrow's actual meter readings correlate perfectly with tomorrow's peak \u2014 and using them is time leakage: perfect in the backtest, impossible in production.

If a feature makes the model look too good, check the clock.`},{h:"Beat the baseline first",t:`Before any model: what does 'same as yesterday' score? That naive baseline is free and surprisingly strong on calm days.

A forecasting model earns deployment by beating the baseline where it matters \u2014 the spikes (cold snaps, kettles at half-time), not the easy Tuesdays. Always report 'versus baseline', never accuracy alone.`}]},id:"fl-wall",x:840,y:110,label:"Live demand screen",lines:["A wall screen of national demand ticking in real time. A pencilled line marks tonight's forecast peak. Someone has written 'kettles at half-time' next to a famous spike."],tasks:[]}]},coverpoint:{name:"Coverpoint",place:"The Hatchery, St John's Innovation Park",mx:0,my:0,hidden:!0,hub:"hatchery",blurb:"County-cricket analytics. Probabilities, not promises.",floor:"#EFE9DA",floorKind:"wood",accent:"#557A2E",wall:"#E7E3D2",wallDark:"#BDB89E",spawn:{x:450,y:505},walls:[{x:560,y:392,w:12,h:150},{x:572,y:380,w:140,h:12},{x:762,y:380,w:120,h:12}],labels:[{x:300,y:76,t:"THE PAVILION"},{x:724,y:408,t:"THE NETS"}],decor:[{t:"rug",x:70,y:120,w:330,h:190,color:"#E5DFC8"},{t:"rug",plain:1,x:584,y:404,w:286,h:126,color:"#D8E9C2"},{t:"roadline",x:584,y:432,w:286},{t:"roadline",x:584,y:472,w:286}],furniture:[{t:"board",x:420,y:52},{t:"desk",x:100,y:150},{t:"desk",x:100,y:250},{t:"desk",x:290,y:150},{t:"kitchen",x:80,y:470},{t:"sofa",x:300,y:460},{t:"printer",x:470,y:250},{t:"plant",x:850,y:80},{t:"shelf",x:856,y:200},{t:"stumps",x:660,y:470},{t:"stumps",x:800,y:470}],npcs:[{id:"dec",name:"Dec",role:"Founder, Coverpoint",skin:1,shirt:"#557A2E",lines:["We sell win probabilities to county cricket clubs. Half the job is the model. The other half is explaining what a probability IS.","An investor just rang about last night's match. Come and hear what he said \u2014 you'll enjoy this."],tasks:["calibration-check"],waypoints:[{x:250,y:330,pause:3e3},{x:430,y:330,pause:2600},{x:430,y:170,pause:2400}]}],ambient:[{skin:4,shirt:"#F2EFE6",waypoints:[{x:640,y:450,pause:2400},{x:730,y:450,pause:1600}]}],objects:[{id:"cp-wall",x:470,y:134,label:"Win-probability wall",lines:["Last season's predictions plotted against what actually happened, bucket by bucket. The dots hug the diagonal. Dec polishes this chart like a trophy."],read:{id:"doc-calib",title:"Probabilities Aren't Promises",pages:[{h:"What 78% actually means",t:`The model said 78% and the team lost. Was the model wrong? One outcome can't tell you \u2014 a well-calibrated 78% loses 22% of the time, on schedule.

A probability is a claim about frequency: across all the matches where we said 78%, about 78% should be wins. That's calibration, and it's checkable. Bucket the predictions (the 60s, the 70s, the 80s), then compare each bucket's predicted rate with what actually happened. Dots near the diagonal mean the numbers mean what they say.

Judging a forecaster on a single result is the investor's mistake. Judge the season.`},{h:"Scoring a forecaster",t:`Good forecasts are calibrated AND sharp. Always saying 50% can be perfectly calibrated and perfectly useless; the skill is committing toward 0 or 100 and still being right at the stated rate.

Proper scoring rules \u2014 the Brier score is the friendly one \u2014 reward exactly that: your penalty is the squared gap between your stated probability and the outcome, averaged over many events. Crucially, your best strategy under a proper score is honesty.

Which is why rounding to 'definitely' is malpractice: it destroys the information clients pay for. Probabilities aren't promises; they're the inventory.`}]},tasks:[]},{id:"cp-nets",x:700,y:444,label:"The indoor nets",lines:["A strip of astroturf, two sets of stumps, and a whiteboard of bowling speeds. Someone has written 'n=14, calm down' under an intern's economy-rate chart."],tasks:[]}]},kindly:{name:"Kindly",place:"The Hatchery, St John's Innovation Park",mx:0,my:0,hidden:!0,hub:"hatchery",blurb:"Wellbeing tech with boundaries.",floor:"#F4ECEF",floorKind:"carpet",accent:"#C25B8A",wall:"#F0E2E9",wallDark:"#C9A6B8",spawn:{x:450,y:505},walls:[{x:18,y:380,w:130,h:12},{x:198,y:380,w:114,h:12},{x:300,y:392,w:12,h:150}],labels:[{x:160,y:408,t:"CALM CORNER"},{x:560,y:76,t:"THE STUDIO"}],decor:[{t:"rug",x:350,y:120,w:330,h:190,color:"#EBD9E2"}],furniture:[{t:"board",x:640,y:52},{t:"desk",x:380,y:150},{t:"desk",x:380,y:250},{t:"desk",x:560,y:150},{t:"sofa",x:80,y:450},{t:"plant",x:230,y:470},{t:"kitchen",x:600,y:470},{t:"plant",x:850,y:80},{t:"shelf",x:856,y:250}],npcs:[{id:"noor",name:"Noor",role:"Founder, Kindly",skin:2,shirt:"#C25B8A",lines:["We build mood tracking that doesn't creep people out. Turns out that's a product feature AND a legal requirement.","Our consent screen ships next sprint. Help me get it right."],tasks:["consent-design"],waypoints:[{x:480,y:330,pause:3e3},{x:640,y:330,pause:2600},{x:480,y:170,pause:2400}]}],ambient:[{skin:0,shirt:"#7A8AA6",waypoints:[{x:200,y:250,pause:2600},{x:200,y:150,pause:2200}]}],objects:[{read:{id:"doc-consent",title:"Kindly Consent Principles",pages:[{h:"Consent worth the name",t:`Mood data is health data \u2014 special category, the most protected kind. Consent for it must be explicit, specific and informed: separate plain-language choices per purpose (improving the product, research sharing, reminders), nothing pre-ticked, nothing buried in terms and conditions.

Default is off. Each choice is revocable in one tap, and withdrawal actually deletes. 'Basically anonymous' is not a legal category.
